<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restoran - Hero</title>
  <link rel="stylesheet" href="./src/output.css">
</head>
<body class="bg-gray-900 font-sans antialiased">

  <section class="relative min-h-screen bg-[url('./Images/bg-hero.jpg')] bg-cover bg-center flex flex-col justify-between">
    
    <div class="absolute inset-0 bg-black/70 z-0"></div>

    <header class="relative z-10 w-full px-6 lg:px-16 py-5">
      <nav class="max-w-7xl mx-auto flex items-center justify-between">
        
        <div class="flex items-center space-x-2 text-amber-500 font-bold text-2xl tracking-wide">
          <span><img src="./Images/logo.png" alt="Restoran" height="2"></span>
          <span class="text-amber-500">Restoran</span>
        </div>

        <div class="hidden md:flex items-center space-x-8 text-white font-semibold text-sm tracking-wider uppercase">
          <a href="#" class="text-amber-500 transition">Home</a>
          <a href="#" class="hover:text-amber-500 transition">About</a>
          <a href="#" class="hover:text-amber-500 transition">Service</a>
          <a href="#" class="hover:text-amber-500 transition">Menu</a>
          <div class="relative group cursor-pointer">
            <span class="hover:text-amber-500 transition">Pages ▾</span>
          </div>
          <a href="#" class="hover:text-amber-500 transition">Contact</a>
          
          <a href="#" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2.5 rounded-none transition font-bold uppercase tracking-wide text-xs">
            Book Table
          </a>
        </div>

        <div class="md:hidden text-white text-2xl cursor-pointer">☰</div>
      </nav>
    </header>

    <div class="relative z-10 max-w-7xl mx-auto my-auto px-6 lg:px-16 py-12 w-full grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
      
      <div class="lg:col-span-7 flex flex-col space-y-6 text-left">
        <h1 class="text-white text-5xl md:text-6xl lg:text-7xl font-extrabold tracking-tight leading-tight">
          Enjoy Our <br>
          <span class="text-white">Delicious Meal</span>
        </h1>
        <p class="text-gray-300 text-base md:text-lg max-w-xl leading-relaxed">
          Tempor erat elitr rebum at clita. Diam dolor diam ipsum sit. Aliqu diam amet diam et eos. Clita erat ipsum et lorem et sit, sed stet lorem sit clita duo justo magna dolore erat amet.
        </p>
        <div>
          <a href="#" class="inline-block bg-amber-500 hover:bg-amber-600 text-white font-bold uppercase tracking-wider text-sm px-8 py-4 transition shadow-lg">
            Book Table
          </a>
        </div>
      </div>

      <div class="lg:col-span-5 flex justify-center lg:justify-end">
        <div class="relative w-72 h-72 sm:w-96 sm:h-96 md:w-[420px] md:h-[420px] rounded-full overflow-hidden border-4 border-white/10 shadow-2xl animate-[spin_60s_linear_infinite] hover:pause">
          <img 
            src="./Images/hero.png" 
            alt="Delicious Grilled Food" 
            class="w-full h-full object-cover"
          >
        </div>
      </div>

    </div>

    <div class="h-12 relative z-10"></div>
  </section>

</body>
</html>
